slug: "medieval"
cefr: "b1"
title: "中世にタイムスリップしたら使える英会話"
overview: "中世ヨーロッパにタイムスリップした想定で、場所・時間・助けの求め方など、サバイバルに必要な現代英語表現を楽しみながら学びます。"
scenario: "気づいたら中世ヨーロッパにタイムスリップしていました！場所の確認、年号の確認、道の聞き方など、現代英語でサバイバルに必要な英会話を身につけましょう。"
thumbnail: "top/situation_thum_medieval.png"
steps:
  - step_number: 1
    body: "「ここはどこですか？」を英語で言うと？"
    choices:
      - body: "Where am I?"
        is_correct: true
        feedback: |-
          正解！<b>Where am I?</b> は「ここはどこですか？」の最もシンプルで自然な表現です。場所が分からないときに咄嗟に使えます。"Where is this place?"（ここはどんな場所ですか？）や "What is this place?"（ここは何というところですか？）も同様の場面で使えます。
      - body: "Where is here?"
        is_correct: false
        feedback: |-
          惜しい！"Where is here?" は英語として不自然です。「ここはどこ？」と聞くときは <b>Where am I?</b> が正しい表現です。"here"（ここ）は場所を指す副詞なので、"Where is here?" とは言いません。
      - body: "What place is this?"
        is_correct: false
        feedback: |-
          惜しい！意味は通じますが、咄嗟に使うなら <b>Where am I?</b> の方が自然です。"What place is this?" はやや古風・文語的な響きがあります。現代英語では "Where am I?" または "Where is this?" が一般的です。
  - step_number: 2
    body: "「今は西暦何年ですか？」を英語で言うと？"
    choices:
      - body: "What year is it?"
        is_correct: true
        feedback: |-
          正解！<b>What year is it?</b> は「今は何年ですか？」のシンプルで自然な表現です。タイムスリップでなくても、年号を確認したいときに使えます。"What's today's date?"（今日は何日ですか？）や "What month is it?"（今は何月ですか？）も関連表現として覚えておきましょう。
      - body: "Which year are we?"
        is_correct: false
        feedback: |-
          惜しい！"Which year are we?" は英語として不自然です。「今は何年？」は <b>What year is it?</b> が正しい表現です。"What" を使って「何年か」を尋ねましょう。
      - body: "What is the year now?"
        is_correct: false
        feedback: |-
          惜しい！意味は伝わりますが、自然な英語は <b>What year is it?</b> です。"What is the year now?" は語順が不自然でぎこちない印象を与えます。シンプルに "What year is it?" と覚えましょう。
  - step_number: 3
    body: "「街はどちらへ行けばつきますか？」を英語で言うと？"
    choices:
      - body: "Which way is the town?"
        is_correct: true
        feedback: |-
          正解！<b>Which way is the town?</b> は「街はどちらの方向ですか？」というシンプルで使いやすい表現です。"Which way is the castle?"（城はどちらですか？）のように目的地を入れ替えると応用できます。"How do I get to the town?"（街へはどう行けばいいですか？）も同じ場面で使える便利な表現です。
      - body: "Where should I go for the town?"
        is_correct: false
        feedback: |-
          惜しい！意味は通じますが、自然な英語は <b>Which way is the town?</b> です。道を尋ねるときは "Which way is〜?"（〜はどちらですか？）や "How do I get to〜?"（〜へはどう行きますか？）がよく使われます。
      - body: "Town is which direction?"
        is_correct: false
        feedback: |-
          惜しい！語順が英語として不自然です。正しくは <b>Which way is the town?</b> です。英語の疑問文は "Which way is〜?" のように疑問詞を文頭に置きます。
  - step_number: 4
    body: "「助けてください！」を英語で言うと？"
    choices:
      - body: "Help me, please!"
        is_correct: true
        feedback: |-
          正解！<b>Help me, please!</b> は緊急時に使える最もシンプルな表現です。とっさの場面では "Help!" だけでも十分伝わります。"Please help me." は落ち着いて丁寧にお願いする場面向きで、緊急度が少し下がります。状況に応じて使い分けましょう。
      - body: "I need a help!"
        is_correct: false
        feedback: |-
          惜しい！"help" は不可算名詞なので "a help" とは言いません。「助けが必要です」は <b>I need help.</b> が正しい表現です。緊急時には <b>Help me, please!</b> や "Help!" がより自然です。
      - body: "Please do help for me!"
        is_correct: false
        feedback: |-
          惜しい！文法的に不自然です。「助けてください」は <b>Help me, please!</b> または "Please help me." が正しい表現です。"help" の後には "me" のような目的語を直接続けましょう。
  - step_number: 5
    body: "「食べ物と水をいただけますか？」を英語で言うと？"
    choices:
      - body: "Could I have some food and water?"
        is_correct: true
        feedback: |-
          正解！<b>Could I have some food and water?</b> は丁寧にものを頼む定番表現です。"Could I have〜?" は「〜をいただけますか？」という意味で、レストランや誰かに何かをお願いする場面で広く使えます。より切迫した状況なら "I need food and water."（食べ物と水が必要です）も使えます。
      - body: "Give me food and water."
        is_correct: false
        feedback: |-
          惜しい！"Give me〜" は命令口調で失礼な印象を与えます。特に見知らぬ人にお願いするときは <b>Could I have some food and water?</b> のように丁寧な表現を使いましょう。"Can I have〜?" も同様に使えますが、"Could I have〜?" の方がより丁寧です。
      - body: "I want food and water."
        is_correct: false
        feedback: |-
          惜しい！"I want〜" は希望を伝えられますが、人にお願いする場面では少し直接的です。<b>Could I have some food and water?</b> の方が丁寧で自然な依頼表現です。"I want〜" は独り言や状況説明には使えますが、お願いには "Could I have〜?" を使いましょう。
  - step_number: 6
    body: "「私の言葉が分かりますか？」を英語で言うと？"
    choices:
      - body: "Do you understand me?"
        is_correct: true
        feedback: |-
          正解！<b>Do you understand me?</b> は「私の言っていることが分かりますか？」という意味です。言葉が通じているか確認したい場面で使えます。"Can you understand me?"（私の言葉は分かりますか？）もほぼ同じ意味です。英語が伝わっているか不安なときに便利な表現です。
      - body: "You understand my words?"
        is_correct: false
        feedback: |-
          惜しい！語順が不自然です。英語の疑問文は動詞を主語の前に出します。「分かりますか？」は <b>Do you understand me?</b> が正しい語順です。"You understand my words?" は文語的またはくだけた場面でのみ使われます。
      - body: "Can you hear my language?"
        is_correct: false
        feedback: |-
          惜しい！"Can you hear〜?" は「聞こえますか？」という意味になり、「理解できますか？」とは異なります。「言葉が通じていますか？」は <b>Do you understand me?</b> が適切です。"understand"（理解する）と "hear"（聞こえる）を使い分けましょう。
  - step_number: 7
    body: "「危険です、逃げてください！」を英語で言うと？"
    choices:
      - body: "It's dangerous! Run!"
        is_correct: true
        feedback: |-
          正解！<b>It's dangerous! Run!</b> は緊急を知らせる簡潔で力強い表現です。緊急時は短くシンプルな表現が最も伝わります。"Watch out!"（気をつけて！）や "Get out of here!"（ここから逃げて！）も緊急時に使える便利な表現です。
      - body: "There is danger, please escape!"
        is_correct: false
        feedback: |-
          惜しい！意味は通じますが、緊急時には <b>It's dangerous! Run!</b> のような短くシンプルな表現が瞬時に伝わります。"escape" は「脱出する（計画的・状況的）」というニュアンスがあり、咄嗟の指示には "Run!"（逃げろ！）の方が自然です。
      - body: "Be careful of danger!"
        is_correct: false
        feedback: |-
          惜しい！"Be careful"（気をつけて）は注意を促す表現ですが、今すぐ逃げるよう促すには不十分です。緊急時には <b>It's dangerous! Run!</b> のように行動を直接指示する表現を使いましょう。
  - step_number: 8
    body: "「私は敵ではありません」を英語で言うと？"
    choices:
      - body: "I'm not your enemy."
        is_correct: true
        feedback: |-
          正解！<b>I'm not your enemy.</b> は「私はあなたの敵ではありません」という意味で、誤解を解きたい場面で使える表現です。"I mean no harm."（悪意はありません）や "I come in peace."（平和的にやってきました）も同様の場面で使える便利なフレーズです。
      - body: "I am not enemy."
        is_correct: false
        feedback: |-
          惜しい！"enemy" の前に冠詞 "an" が必要です。また、誰の敵でもないことを明確にするため "your" も加えましょう。正しくは <b>I'm not your enemy.</b> です。
      - body: "Don't think I am bad."
        is_correct: false
        feedback: |-
          惜しい！意味は伝わりますが、不自然な表現です。「敵ではない」と伝える場合は <b>I'm not your enemy.</b> が最も直接的で自然です。"I mean no harm."（悪意はありません）も覚えておくと便利です。
  - step_number: 9
    body: "「一番近い村はどこですか？」を英語で言うと？"
    choices:
      - body: "Where is the nearest village?"
        is_correct: true
        feedback: |-
          正解！<b>Where is the nearest village?</b> は「一番近い村はどこですか？」の自然な表現です。"nearest"（最も近い）は "near" の最上級です。"village"（村）を "town"（町）、"hospital"（病院）、"shelter"（避難場所）などに替えると様々な場面で応用できます。
      - body: "Where is the most near village?"
        is_correct: false
        feedback: |-
          惜しい！"near" の最上級は "most near" ではなく <b>nearest</b> です。1〜2音節の形容詞は "-est" をつけて最上級にします。正しくは <b>Where is the nearest village?</b> です。
      - body: "Which village is close?"
        is_correct: false
        feedback: |-
          惜しい！"Which village is close?" は「どの村が近いですか？」という意味になり、複数の村から選ぶニュアンスになります。「一番近い村」を尋ねるには <b>Where is the nearest village?</b> が自然です。
  - step_number: 10
    body: "「ありがとうございます、助かりました」を英語で言うと？"
    choices:
      - body: "Thank you, you saved me."
        is_correct: true
        feedback: |-
          正解！<b>Thank you, you saved me.</b> は「ありがとうございます、助かりました（あなたが救ってくれました）」という感謝の表現です。"save"（救う）は日常でも「データを保存する」「節約する」など幅広く使う重要動詞です。より強く感謝するなら "I can't thank you enough."（感謝しきれません）も使えます。
      - body: "Thanks for your save."
        is_correct: false
        feedback: |-
          惜しい！"save" は名詞として "Thanks for your save." とは使いません。「助けてくれてありがとう」は <b>Thank you, you saved me.</b> または "Thank you for saving me." が正しい表現です。
      - body: "Thank you, I was saved."
        is_correct: false
        feedback: |-
          惜しい！"I was saved." は文法的に正しいですが、誰が助けてくれたのかが不明確です。感謝を伝える場面では <b>Thank you, you saved me.</b> のように相手を主語にした方が、より直接的で温かみのある表現になります。