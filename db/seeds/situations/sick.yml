slug: "sick"
cefr: "b1"
title: "現地で体調を崩したときに使える英会話"
overview: "海外旅行中に発熱や吐き気などの体調不良が起きたとき、症状を伝えて医療機関を利用するための英会話を学びます。"
scenario: "旅行中に突然発熱と吐き気に襲われました。ホテルのスタッフや病院・薬局でスムーズにコミュニケーションが取れるよう、体調不良を伝える英会話を身につけましょう。"
thumbnail: "top/situation_thum_sick.png"
steps:
  - step_number: 1
    body: "「熱（発熱）」を英語で言うと？"
    choices:
      - body: "fever"
        is_correct: true
        feedback: |-
          正解！「発熱」は <b>fever</b> です。"I have a fever."（熱があります）が医療現場での標準表現。"high fever"（高熱）・"slight fever"（微熱）のように形容詞を前に置いて使えます。
      - body: "temperature"
        is_correct: false
        feedback: |-
          惜しい！正解は <b>fever</b> です。"temperature" は体温全般を指す言葉で、"I have a temperature" も口語では通じますが、医療現場では "fever" が標準的です。TOEICでも "fever" が正解になるケースが多いです。
      - body: "cold"
        is_correct: false
        feedback: |-
          惜しい！「熱（発熱）」は <b>fever</b> です。"cold" は「風邪」のこと。"I have a cold."（風邪をひいています）と "I have a fever."（熱があります）を混同しないよう注意。日本人が最も混同しやすいペアです。
  - step_number: 2
    body: "「熱があるようです」を英語で言うと？"
    choices:
      - body: "I think I have a fever."
        is_correct: true
        feedback: |-
          正解！<b>I think I have a fever.</b> "I think〜" を冒頭に置くと「〜のようです・〜だと思います」という不確かさを自然に表現できます。病院・薬局・ホテルのフロントでそのまま使える実用的な一言です。
      - body: "I feel hot."
        is_correct: false
        feedback: |-
          惜しい！正解は <b>I think I have a fever.</b> です。"I feel hot" は「（暑くて）熱く感じる」という意味にもとれるため、発熱の申告としては不十分です。"fever" という単語を使って明確に伝えましょう。
      - body: "I have a high temperature."
        is_correct: false
        feedback: |-
          惜しい！正解は <b>I think I have a fever.</b> です。"I have a high temperature" も正しい英語ですが、「発熱」の自然な表現は "have a fever" です。TOEICリスニングでも "have a fever" が頻出します。
  - step_number: 3
    body: "「吐き気がする（状態）」を表す英語は？"
    choices:
      - body: "nauseous"
        is_correct: true
        feedback: |-
          正解！「吐き気がする（状態）」は形容詞 <b>nauseous</b> です。"I feel nauseous."（吐き気がします）が定番の言い方。アメリカ英語では "nauseated" も使われます。発音は「ノージアス」。
      - body: "dizzy"
        is_correct: false
        feedback: |-
          惜しい！"dizzy" は「めまいがする」という意味です。「吐き気」には <b>nauseous</b> を使います。"nauseous"（吐き気）と "dizzy"（めまい）はセットで起きやすい症状なので、区別して覚えましょう。
      - body: "sick"
        is_correct: false
        feedback: |-
          惜しい！"sick" は「具合が悪い」という広い意味を持ちますが、吐き気を具体的に伝えるには <b>nauseous</b> が正確です。イギリス英語では "I feel sick" が吐き気を意味することもありますが、アメリカ英語では "nauseous" が標準的です。
  - step_number: 4
    body: "「吐き気とめまいがします」を英語で言うと？"
    choices:
      - body: "I feel nauseous and dizzy."
        is_correct: true
        feedback: |-
          正解！<b>I feel nauseous and dizzy.</b> "I feel＋形容詞" で体の状態を伝える構文。複数の症状を "and" でつなぐことで一度に説明できます。医療現場で即通じる自然な表現です。
      - body: "I have a stomachache and headache."
        is_correct: false
        feedback: |-
          惜しい！正解は <b>I feel nauseous and dizzy.</b> です。"stomachache"（胃痛・腹痛）や "headache"（頭痛）は痛みの症状。吐き気・めまいとは異なる症状なので正確に使い分けましょう。
      - body: "I'm feeling sick and tired."
        is_correct: false
        feedback: |-
          惜しい！正解は <b>I feel nauseous and dizzy.</b> です。"sick and tired" は「うんざりしている」という慣用句です。体調不良の文脈では誤解を生むので注意が必要です。日本人が混同しやすいパターンです。
  - step_number: 5
    body: "「英語を話せる医者」を英語で言うと？"
    choices:
      - body: "an English-speaking doctor"
        is_correct: true
        feedback: |-
          正解！「英語を話せる医者」は <b>an English-speaking doctor</b> です。"〜-speaking" は「〜語を話す」という複合形容詞。"Japanese-speaking staff"（日本語を話すスタッフ）などにも応用できます。
      - body: "an English doctor"
        is_correct: false
        feedback: |-
          惜しい！正解は <b>an English-speaking doctor</b> です。"an English doctor" だと「イギリス人の医者」という意味になってしまいます。「英語を話せる」と言うには必ず "-speaking" を加えましょう。日本人が混同しやすい表現です。
      - body: "a doctor who can speak English"
        is_correct: false
        feedback: |-
          惜しい！正解は <b>an English-speaking doctor</b> です。"a doctor who can speak English" も正しい英語ですが、複合形容詞 "English-speaking" の方がより簡潔で自然です。TOEICではこの複合形容詞が頻出します。
  - step_number: 6
    body: "「近くに英語を話せる医者がいる病院はありますか？」を英語で言うと？"
    choices:
      - body: "Is there a hospital nearby with an English-speaking doctor?"
        is_correct: true
        feedback: |-
          正解！<b>Is there a hospital nearby with an English-speaking doctor?</b> "Is there 〜 nearby?" は「近くに〜はありますか？」の便利な構文。"hospital" を "pharmacy"（薬局）や "clinic"（クリニック）に変えてアレンジできます。
      - body: "Where is the nearest hospital with an English doctor?"
        is_correct: false
        feedback: |-
          惜しい！正解は <b>Is there a hospital nearby with an English-speaking doctor?</b> です。"English doctor" は「イギリス人の医者」という意味になります。「英語を話せる」には必ず "English-speaking" を使いましょう。
      - body: "Can you find me a hospital with English service?"
        is_correct: false
        feedback: |-
          惜しい！正解は <b>Is there a hospital nearby with an English-speaking doctor?</b> です。"English service" は日本語的な発想による不自然な表現。"English-speaking doctor" と具体的に言うのが正確です。
  - step_number: 7
    body: "「救急車」を英語で言うと？"
    choices:
      - body: "ambulance"
        is_correct: true
        feedback: |-
          正解！「救急車」は <b>ambulance</b> です。緊急時に真っ先に使う単語。発音は「アンビュランス」。海外の緊急番号は国によって異なります（米国：911、英国：999）。
      - body: "emergency car"
        is_correct: false
        feedback: |-
          惜しい！「救急車」は <b>ambulance</b> です。"emergency car" は日本語の直訳的な和製英語で、英語では使いません。緊急車両は "emergency vehicle" とも言いますが、救急車特有の単語は "ambulance" です。
      - body: "first aid truck"
        is_correct: false
        feedback: |-
          惜しい！「救急車」は <b>ambulance</b> です。"first aid"（応急処置）を組み合わせた表現ですが、救急車を指す単語は "ambulance" です。"first aid kit"（救急箱）は別の文脈で使います。
  - step_number: 8
    body: "「救急車を呼んでください」を英語で言うと？"
    choices:
      - body: "Please call an ambulance."
        is_correct: true
        feedback: |-
          正解！<b>Please call an ambulance.</b> "Please call 〜" は「〜を呼んでください」という丁寧な依頼表現。緊急時にはより短く "Call an ambulance!" とも言えます。
      - body: "I need emergency help."
        is_correct: false
        feedback: |-
          惜しい！正解は <b>Please call an ambulance.</b> です。"I need emergency help" は助けを求めていますが、救急車を呼ぶよう具体的に依頼していません。緊急時は "ambulance" という具体的な言葉で明確に伝えましょう。
      - body: "Take me to the hospital!"
        is_correct: false
        feedback: |-
          惜しい！正解は <b>Please call an ambulance.</b> です。"Take me to the hospital!" は「病院に連れて行って」という意味で、救急車を呼ぶ依頼とは異なります。動けない状況では "Please call an ambulance." が重要です。
  - step_number: 9
    body: "「アレルギーがある」を表す英語は？"
    choices:
      - body: "allergic"
        is_correct: true
        feedback: |-
          正解！「〜アレルギーがある」は形容詞 <b>allergic</b> を使い、"I'm allergic to penicillin."（ペニシリンアレルギーがあります）のように表現します。名詞形は "allergy"（I have a penicillin allergy.）です。
      - body: "sensitive"
        is_correct: false
        feedback: |-
          惜しい！医療的なアレルギーを伝えるには <b>allergic</b> が正解です。"sensitive to" は「〜に敏感」というニュアンスで、免疫反応を伴うアレルギーとは医学的に異なります。
      - body: "intolerant"
        is_correct: false
        feedback: |-
          惜しい！免疫によるアレルギーには <b>allergic</b> が正解です。"intolerant" は "lactose intolerant"（乳糖不耐症）のように消化系の不耐性を指し、アレルギーとは別概念です。医療現場では正確な表現が重要です。
  - step_number: 10
    body: "「ペニシリンアレルギーがあります」を英語で言うと？"
    choices:
      - body: "I'm allergic to penicillin."
        is_correct: true
        feedback: |-
          正解！<b>I'm allergic to penicillin.</b> 海外の医療機関では必ずアレルギーの有無を確認されます。自分のアレルゲン（"aspirin" アスピリン・"shellfish" 甲殻類など）を英語で言えるよう準備しておきましょう。
      - body: "I can't take penicillin."
        is_correct: false
        feedback: |-
          惜しい！正解は <b>I'm allergic to penicillin.</b> です。"I can't take penicillin" は「服用できない」という事実を伝えますが、アレルギーが理由だとわかりません。医師に正確に伝えるため "allergic" という言葉を使いましょう。
      - body: "Penicillin doesn't work for me."
        is_correct: false
        feedback: |-
          惜しい！正解は <b>I'm allergic to penicillin.</b> です。"doesn't work for me" は「効かない・体に合わない」という意味で、アレルギーとは全く異なります。アレルギーは命に関わる場合があるため "I'm allergic to〜" で明確に伝えましょう。
