slug: "luggage"
cefr: "b1"
title: "空港で預け荷物を無くした時に使える英会話"
overview: "フライト後にバゲージクレームで荷物が出てこないとき、航空会社のスタッフに紛失を報告し補償を求めるための英会話を学びます。"
scenario: "到着便のバゲージクレームでいつまで待っても荷物が出てきません。航空会社のカウンターに行き、荷物の紛失を申告して捜索・補償の手続きを進めましょう。"
thumbnail: "top/situation_thum_luggage.png"
steps:
  - step_number: 1
    body: "「預け荷物（チェックイン荷物）」を英語で言うと？"
    choices:
      - body: "checked baggage"
        is_correct: true
        feedback: |-
          正解！「預け荷物」は <b>checked baggage</b> です。チェックイン時に預ける荷物のこと。"carry-on baggage"（機内持ち込み荷物）と区別します。"checked luggage" も同じ意味で使えます。
      - body: "carry-on baggage"
        is_correct: false
        feedback: |-
          惜しい！「預け荷物」は <b>checked baggage</b> です。"carry-on baggage" は「機内持ち込み荷物」のこと。紛失が起きるのは預けた荷物（checked baggage）なので区別が重要です。
      - body: "hand luggage"
        is_correct: false
        feedback: |-
          惜しい！「預け荷物」は <b>checked baggage</b> です。"hand luggage" は「手荷物（機内持ち込み）」のことで、こちらも機内に持ち込む荷物を指します。預ける荷物は "checked" をつけて区別しましょう。
  - step_number: 2
    body: "「預け荷物が届いていません」を英語で言うと？"
    choices:
      - body: "My checked baggage hasn't arrived."
        is_correct: true
        feedback: |-
          正解！<b>My checked baggage hasn't arrived.</b> 現在完了の否定形で「（今の時点でまだ）届いていない」という状況を表します。航空会社のスタッフへの第一声として最も自然な表現です。
      - body: "I lost my baggage."
        is_correct: false
        feedback: |-
          惜しい！正解は <b>My checked baggage hasn't arrived.</b> です。"I lost my baggage" は「私が荷物をなくした（自分の責任で）」というニュアンスになります。航空会社側の問題として申告するには "hasn't arrived" の方が適切です。日本人が混同しやすい表現です。
      - body: "My baggage is missing."
        is_correct: false
        feedback: |-
          惜しい！正解は <b>My checked baggage hasn't arrived.</b> です。"is missing" も意味は通じますが、受け取りを待っている状況は "hasn't arrived" の方が自然です。また "checked" をつけて預け荷物であることを明示しましょう。
  - step_number: 3
    body: "「荷物の紛失届（申告書）」を英語で言うと？"
    choices:
      - body: "baggage claim report"
        is_correct: true
        feedback: |-
          正解！「荷物の紛失届」は <b>baggage claim report</b> です。"file a baggage claim report"（紛失届を提出する）が定番表現。航空会社のカウンターで書く書類のことです。
      - body: "baggage receipt"
        is_correct: false
        feedback: |-
          惜しい！「荷物の紛失届」は <b>baggage claim report</b> です。"receipt" は「領収書・受取証」のこと。荷物を受け取った証明書ではなく、紛失を申告する書類には "report" を使います。
      - body: "baggage ticket"
        is_correct: false
        feedback: |-
          惜しい！「荷物の紛失届」は <b>baggage claim report</b> です。"baggage ticket" は預け入れ時に渡される「手荷物引換証（クレームタグ）」のこと。紛失の申告書は "claim report" です。
  - step_number: 4
    body: "「荷物の紛失届を提出したいのですが」を英語で言うと？"
    choices:
      - body: "I'd like to file a baggage claim report."
        is_correct: true
        feedback: |-
          正解！<b>I'd like to file a baggage claim report.</b> "I'd like to〜" は「〜したいのですが」という丁寧な意思表明。"file"（書類を提出する）は公式手続きで頻出する動詞です。
      - body: "I want to report my lost baggage."
        is_correct: false
        feedback: |-
          惜しい！正解は <b>I'd like to file a baggage claim report.</b> です。"I want to〜" は直接的すぎる場合があります。"I'd like to〜" の方が丁寧で航空会社カウンターでの交渉に適しています。
      - body: "Can I complain about my missing luggage?"
        is_correct: false
        feedback: |-
          惜しい！正解は <b>I'd like to file a baggage claim report.</b> です。"complain" は「不満を言う」というニュアンスが強く、正式な申告には不適切です。手続きを求める際は "file a report" という表現を使いましょう。
  - step_number: 5
    body: "「手荷物引換証（クレームタグ）」を英語で言うと？"
    choices:
      - body: "baggage claim tag"
        is_correct: true
        feedback: |-
          正解！「手荷物引換証」は <b>baggage claim tag</b> です。チェックイン時に荷物に付けられる番号付きのタグのこと。紛失の際に必ず必要になるので、搭乗券と一緒に保管しましょう。
      - body: "boarding pass"
        is_correct: false
        feedback: |-
          惜しい！「手荷物引換証」は <b>baggage claim tag</b> です。"boarding pass" は「搭乗券」のこと。搭乗券も大切ですが、荷物の追跡には "baggage claim tag" が必要です。
      - body: "baggage receipt"
        is_correct: false
        feedback: |-
          惜しい！「手荷物引換証」は <b>baggage claim tag</b> です。"receipt" は「領収書・受領証」のこと。荷物のタグは "tag"（または "sticker" と呼ぶこともある）で、"receipt" とは区別しましょう。
  - step_number: 6
    body: "「こちらが手荷物引換証です」を英語で言うと？"
    choices:
      - body: "Here is my baggage claim tag."
        is_correct: true
        feedback: |-
          正解！<b>Here is my baggage claim tag.</b> "Here is〜" は「こちらが〜です」と物を渡す時の定番表現。"Here is my passport."（パスポートです）・"Here is my ticket."（チケットです）のように応用できます。
      - body: "This is the tag for my bag."
        is_correct: false
        feedback: |-
          惜しい！正解は <b>Here is my baggage claim tag.</b> です。"This is the tag for my bag" でも意味は通じますが、"baggage claim tag" という正式な名称を使う方が受付スタッフに正確に伝わります。
      - body: "I have a sticker from the check-in counter."
        is_correct: false
        feedback: |-
          惜しい！正解は <b>Here is my baggage claim tag.</b> です。"sticker" は非公式な言い方で、"baggage claim tag" の正式な名称を使いましょう。また "Here is〜" の方が物を渡す場面で自然な表現です。
  - step_number: 7
    body: "「〜に届ける」を英語で言うと？"
    choices:
      - body: "deliver"
        is_correct: true
        feedback: |-
          正解！「〜に届ける」は <b>deliver</b> です。"Could you deliver it to my hotel?"（ホテルに届けていただけますか？）が定番表現。"delivery"（配達）・"delivery address"（配達先の住所）と合わせて覚えましょう。
      - body: "carry"
        is_correct: false
        feedback: |-
          惜しい！「〜に届ける（配達する）」は <b>deliver</b> です。"carry" は「運ぶ・持って行く」という意味で、目的地への配達を依頼する文脈では "deliver" が適切です。
      - body: "send"
        is_correct: false
        feedback: |-
          惜しい！「〜に届ける」は <b>deliver</b> です。"send" も「送る・届ける」という意味を持ちますが、荷物の配達依頼には "deliver" がより直接的で適した表現です。
  - step_number: 8
    body: "「ホテルに届けていただけますか？」を英語で言うと？"
    choices:
      - body: "Could you deliver it to my hotel?"
        is_correct: true
        feedback: |-
          正解！<b>Could you deliver it to my hotel?</b> "Could you〜?" は丁寧な依頼表現。荷物が見つかった際の配達先を指定する重要なフレーズです。ホテル名と部屋番号も伝えましょう。
      - body: "Can you bring my bag to the hotel?"
        is_correct: false
        feedback: |-
          惜しい！正解は <b>Could you deliver it to my hotel?</b> です。"bring" は「持ってくる（話し手の方向へ）」というニュアンスがあります。配達を依頼する場面では "deliver" の方が正確です。また "Can you〜?" より "Could you〜?" の方が丁寧です。
      - body: "Please send my luggage to where I'm staying."
        is_correct: false
        feedback: |-
          惜しい！正解は <b>Could you deliver it to my hotel?</b> です。"where I'm staying" は曖昧な表現です。"my hotel" のように具体的に伝えましょう。また "Please〜" より "Could you〜?" の方が柔らかく丁寧な依頼になります。
  - step_number: 9
    body: "「補償・賠償」を英語で言うと？"
    choices:
      - body: "compensation"
        is_correct: true
        feedback: |-
          正解！「補償・賠償」は <b>compensation</b> です。"I'd like to request compensation."（補償を請求したいのですが）が定番表現。TOEICのビジネス英語でも頻出する重要単語です。
      - body: "compliment"
        is_correct: false
        feedback: |-
          惜しい！「補償」は <b>compensation</b> です。"compliment" は「褒め言葉・称賛」のこと。発音・スペルが似ており日本人が混同しやすいですが、全く異なる意味です。カウンターで "compliment" と言わないよう注意しましょう。
      - body: "commission"
        is_correct: false
        feedback: |-
          惜しい！「補償」は <b>compensation</b> です。"commission" は「手数料・委任」という意味。語頭が同じ "com-" のため混同しやすいですが、"compensation"（補償）と "commission"（手数料）は別の単語です。
  - step_number: 10
    body: "「補償を請求したいのですが」を英語で言うと？"
    choices:
      - body: "I'd like to request compensation."
        is_correct: true
        feedback: |-
          正解！<b>I'd like to request compensation.</b> "I'd like to request〜" は「〜を請求したい・〜をお願いしたい」という丁寧な表現。"request compensation for the delay"（遅延に対する補償を請求する）のように理由を追加できます。
      - body: "I want money for my lost bag."
        is_correct: false
        feedback: |-
          惜しい！正解は <b>I'd like to request compensation.</b> です。"I want money〜" は直接的すぎて攻撃的に聞こえる場合があります。公式な交渉では "I'd like to request compensation" の丁寧な表現を使いましょう。
      - body: "I need to be paid back for my baggage."
        is_correct: false
        feedback: |-
          惜しい！正解は <b>I'd like to request compensation.</b> です。"paid back" は「お金を返してもらう（返済）」というニュアンスになります。荷物の損害補償には "compensation" という正式な用語を使いましょう。
